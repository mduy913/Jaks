<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCKYWIN - SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Goldman&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffdf00; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .active { display: block; }

        /* AUTH */
        .auth-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; }
        .btn-gold { background: var(--gold); color: #000; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* HEADER & UI */
        .header { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .bal-chip { border: 1px solid var(--gold); border-radius: 20px; padding: 5px 12px; color: var(--gold); font-family: 'Orbitron'; font-size: 13px; }
        .game-card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #222; text-align: center; }

        /* QR BOX */
        .qr-frame { background: #fff; padding: 10px; border-radius: 15px; width: 240px; margin: 15px auto; }
        .qr-frame img { width: 100%; display: block; }
        .memo-box { background: #000; padding: 15px; border-radius: 10px; border: 1px dotted var(--gold); margin-top: 15px; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #555; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="p-auth" class="page active">
        <div class="auth-wrap">
            <div class="auth-box">
                <h1 style="color:var(--gold); font-family:'Orbitron';">LUCKYWIN</h1>
                <div id="auth-title">ĐĂNG NHẬP</div>
                <input type="text" id="au-u" placeholder="Tên tài khoản">
                <input type="password" id="au-p" placeholder="Mật khẩu">
                <button class="btn-gold" onclick="handleAuth()">VÀO GAME</button>
                <p style="font-size:12px; color:#555; margin-top:15px" onclick="isReg=!isReg; document.getElementById('auth-title').innerText=isReg?'ĐĂNG KÝ':'ĐĂNG NHẬP'">Chưa có TK? Đăng ký</p>
            </div>
        </div>
    </div>

    <div id="p-lobby" class="page">
        <div class="header">
            <b style="color:var(--gold); font-family:'Orbitron';">LUCKYWIN</b>
            <div class="bal-chip">💰 <span id="u-bal">0</span></div>
        </div>
        <div class="game-card">
            <div style="font-size:30px; margin-bottom:15px;" id="tx-time">30</div>
            <div style="font-size:50px; margin-bottom:20px;">🎲🎲🎲</div>
            <div style="display:flex; gap:10px;">
                <button class="btn-gold" style="background:red; color:#fff;" onclick="bet()">TÀI</button>
                <button class="btn-gold" style="background:blue; color:#fff;" onclick="bet()">XỈU</button>
            </div>
        </div>
    </div>

    <div id="p-dep" class="page">
        <div class="header"><b>NẠP TIỀN</b></div>
        <div style="padding:20px; text-align:center;">
            <div class="qr-frame">
                <img src="https://api.vietqr.io/image/970422-0342981313-vInSsh0.jpg" alt="QR Nạp Tiền">
            </div>
            <div class="memo-box">
                Nội dung chuyển khoản:<br>
                <b id="dep-memo" style="color:var(--gold); font-size:20px;">NAP ...</b>
            </div>
            <p style="font-size:12px; color:#555; margin-top:10px;">Chuyển đúng nội dung để được cộng tiền tự động</p>
            <button class="btn-gold" style="margin-top:20px" onclick="alert('Yêu cầu đã gửi!')">TÔI ĐÃ CHUYỂN TIỀN</button>
        </div>
    </div>

    <div class="nav" id="bot-nav" style="display:none;">
        <div class="nav-item active" onclick="showPage('p-lobby', 0)">TRANG CHỦ</div>
        <div class="nav-item" onclick="showPage('p-dep', 1)">NẠP TIỀN</div>
        <div class="nav-item" onclick="alert('Liên hệ Admin')">RÚT TIỀN</div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curU = null, isReg = false, txClock = 30;

    function showPage(id, idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach((b,i) => b.classList.toggle('active', i===idx));
    }

    function handleAuth() {
        const u = document.getElementById('au-u').value.trim().toLowerCase();
        const p = document.getElementById('au-p').value;
        if(!u || !p) return;

        if(isReg) {
            db.ref('users/'+u).set({ password: p, balance: 0 }).then(() => alert("Đăng ký xong!"));
        } else {
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    curU = u;
                    document.getElementById('bot-nav').style.display = 'flex';
                    document.getElementById('dep-memo').innerText = "NAP " + u.toUpperCase();
                    db.ref('users/'+u+'/balance').on('value', sv => {
                        document.getElementById('u-bal').innerText = (sv.val()||0).toLocaleString();
                    });
                    showPage('p-lobby', 0);
                } else alert("Sai thông tin!");
            });
        }
    }

    setInterval(() => {
        txClock--; if(txClock < 0) txClock = 30;
        document.getElementById('tx-time').innerText = txClock;
    }, 1000);

    function bet() { alert("Đã đặt cược!"); }
</script>
</body>
</html>
